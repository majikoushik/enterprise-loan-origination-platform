name: enterprise-loan-origination-platform

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: loan-platform-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "YourStrong@Password!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"YourStrong@Password!\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  customer-api:
    profiles: ["services"]
    build:
      context: .
      dockerfile: src/services/Customer.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__CustomerDb: "Server=sqlserver,1433;Database=EnterpriseLoan_Customer;User Id=sa;Password=YourStrong@Password!;TrustServerCertificate=True"
    ports:
      - "7101:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  loan-application-api:
    profiles: ["services"]
    build:
      context: .
      dockerfile: src/services/LoanApplication.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__LoanApplicationDb: "Server=sqlserver,1433;Database=EnterpriseLoan_LoanApplication;User Id=sa;Password=YourStrong@Password!;TrustServerCertificate=True"
      Notification__WebhookUrl: "http://notification-worker:8080/api/v1/internal/notifications"
      Audit__WebhookUrl: "http://audit-api:8080/api/v1/events"
    ports:
      - "7102:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  eligibility-api:
    profiles: ["services"]
    build:
      context: .
      dockerfile: src/services/Eligibility.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__EligibilityDb: "Server=sqlserver,1433;Database=EnterpriseLoan_Eligibility;User Id=sa;Password=YourStrong@Password!;TrustServerCertificate=True"
      Audit__WebhookUrl: "http://audit-api:8080/api/v1/events"
      Notification__WebhookUrl: "http://notification-worker:8080/api/v1/internal/notifications"
    ports:
      - "7103:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  notification-worker:
    profiles: ["services"]
    build:
      context: .
      dockerfile: src/services/Notification.Worker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__NotificationDb: "Server=sqlserver,1433;Database=EnterpriseLoan_Notification;User Id=sa;Password=YourStrong@Password!;TrustServerCertificate=True"
      Audit__WebhookUrl: "http://audit-api:8080/api/v1/events"
    ports:
      - "5004:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  audit-api:
    profiles: ["services"]
    build:
      context: .
      dockerfile: src/services/Audit.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuditDb: "Server=sqlserver,1433;Database=EnterpriseLoan_Audit;User Id=sa;Password=YourStrong@Password!;TrustServerCertificate=True"
    ports:
      - "5005:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  loan-portal-angular:
    profiles: ["frontend"]
    build:
      context: src/web/loan-portal-angular
      dockerfile: Dockerfile
    ports:
      - "4200:80"

volumes:
  sqlserver-data:

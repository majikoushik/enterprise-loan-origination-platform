name: Build and Push Containers

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [
          { name: "customer-api", dockerfile: "src/services/Customer.Api/Dockerfile" },
          { name: "loan-application-api", dockerfile: "src/services/LoanApplication.Api/Dockerfile" },
          { name: "eligibility-api", dockerfile: "src/services/Eligibility.Api/Dockerfile" },
          { name: "audit-api", dockerfile: "src/services/Audit.Api/Dockerfile" },
          { name: "notification-worker", dockerfile: "src/services/Notification.Worker/Dockerfile" }
        ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build and Push
        run: |
          docker build -f ${{ matrix.service.dockerfile }} -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:${{ github.sha }}
